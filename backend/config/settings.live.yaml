# Live rig configuration — full chain end-to-end.
#
# Camera:    Daheng (eye-in-hand on nova5)
# Pipeline:  yolo_seg → abstain_near_metal (same as settings.seg.yaml)
# Coord:     pixel→world via PlcPoseSource (nova5 RT from PLC telemetry)
# PLC:       Modbus TCP enabled, 3-arm orchestrator drives the route-table cycle
# Workflow:  config/workflow.seg.yaml (seg_pick + pixel_to_world + plc_orchestrator)
#
# Differences from settings.seg.yaml:
#   camera.type:                          mock      → daheng
#   scheduler.task.calibration.pose_source:  default → plc
#   plc_orchestrator.enabled:            false     → true
#
# Run:  uv run python main.py --config config/settings.live.yaml --mode run

app:
  name: "pluck-backend-live"
  version: "0.1.0"
  log_level: "INFO"

camera:
  type: daheng
  # Select the physical USB3 eye-in-hand camera by serial number. The
  # workstation's wireless NIC also discovers a GigE camera on the LAN
  # at 192.168.1.169 (model ME2C-161-75GC), which would be picked up by
  # `device_index: 1` whenever the LAN is up — pinning the SN makes the
  # mapping unambiguous regardless of discovery order.
  device_sn: FCM26010005   # MER2-301-125U3C, eye-in-hand on nova5
  exposure_auto: false
  gain_auto: false
  exposure_time: 20000
  white_balance_mode: once

storage:
  images:
    type: local
    path: ./data/images
  database:
    type: sqlite
    path: ":memory:"
    echo: false

vision:
  pipeline:
    steps:
      - name: crop_square
        type: crop_single_square
        params:
          # Telecentric lens calibration; cell is 10x10 mm with ~0.5 mm
          # chamfered corners and a ~0.5 mm metal collar between cells.
          mm_per_pixel: 0.009857
          cell_size_mm: 10.0
          chamfer_mm: 0.5
          frame_mm: 0.5
          # Anything darker than this gray level is treated as metal. Cell
          # interior pixels are usually >120; metal pixels <60.
          metal_threshold: 100
          # Mild center bias breaks ties between equally-good matches in
          # favor of the candidate nearest the frame center, since the
          # camera always physically frames its target near center.
          center_bias: 0.15
          # Below this normalized match score we fall back to a centered
          # 1100 px box. Real successful matches typically score >0.7.
          min_match_score: 0.40
          border_px: 176
          fallback_side_px: 1100
      - name: segment
        type: yolo_seg
        params:
          model: assets/best_foreigh_segment_yolov8m_seg.pt
          conf: 0.25
          iou: 0.45
          imgsz: 640
          device: auto
          output_dir: data/segmentation_outputs
          save_artifacts: false
      - name: abstain
        type: abstain_near_metal
        params:
          # 1.5 mm safety band along every edge of the cell (mm_per_pixel
          # = 0.009857). Detections whose pick point sits within this band
          # of any metal pixel are abstained, so the picker won't approach
          # the press plate. This is the gripper-vs-plate clearance, NOT
          # the segmentation crop margin.
          safety_margin_px: 152

scheduler:
  loop_delay_ms: 200
  max_errors: 10
  save_images: false
  save_annotated: false
  show_preview: true
  task:
    type: seg_pick
    calibration:
      extrinsic_path: config/calibration/extrinsic.yaml
      intrinsic_path: config/calibration/camera_intrinsic.yaml
      pose_source: plc

video_stream:
  enabled: false

http_image_upload:
  enabled: true
  url: http://192.168.1.89:8088/upload
  robot: Nova5
  connect_timeout_s: 2.0
  upload_timeout_s: 5.0
  retry_count: 1
  queue_size: 32

redis:
  enabled: false

communication: {}

plc_orchestrator:
  enabled: true
  host: 192.168.1.88
  port: 502
  unit_id: 1
  poll_ms: 250
  heartbeat_ms: 1000
  word_order: LOW_WORD_FIRST
  code_mode: U16_AS_FLOAT
  compare_epsilon: 0.001
  echo_wait_ms: 3000
  points_path: config/plc_points.yaml
  auto_start: true
  # Final per-axis adjustments applied after the grid lookup. Field-tuned;
  # epson_offset_x_mm / y_mm absorb residual mechanical/optical bias, and
  # epson_z_mm pins the dip depth at the operator-validated optimum
  # (overrides epson_ls6_fallback.z in plc_points.yaml).
  epson_offset_x_mm: -0.081
  epson_offset_y_mm: 0.559
  epson_z_mm: 9.8
  epson_u_min_deg: 30.0
  epson_u_max_deg: 110.0
  # Epson V2.0 alignment parameters. Distance <= threshold means tweezer
  # predicted tip and target are considered overlapped. If not overlapped,
  # X/Y correction = pixel_error * mm_per_px; set mm_per_px negative if
  # the field direction is opposite on the real machine.
  epson_alignment_match_distance_px: 20.0
  epson_alignment_x_mm_per_px: 0.009857
  epson_alignment_y_mm_per_px: 0.009857
  epson_alignment_max_correction_mm: 5.0
  epson_alignment_snapshot_timeout_ms: 2000
  nova5_to_epson_mapping:
    enabled: true
    path: config/nova5_to_epson_grid.yaml

workflow:
  enabled: true
  path: "config/workflow.seg.yaml"
